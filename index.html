<style>
  :root {
    --ocean: #0d2033;
    --pine: #1a3a2a;
    --fjord: #1b4f72;
    --ice: #e8f4f8;
    --birch: #f5efe6;
    --amber: #d4870a;
    --copper: #b45309;
    --moss: #4a7c59;
    --light-text: #f0ebe3;
    --panel-bg: rgba(13, 32, 51, 0.96);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--ocean);
    color: var(--light-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(135deg, var(--ocean) 0%, #0f2d45 100%);
    padding: 14px 24px;
    border-bottom: 2px solid var(--amber);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    font-weight: 900;
    letter-spacing: 0.01em;
    color: #fff;
  }

  .header-left h1 span {
    color: var(--amber);
  }

  .header-left p {
    font-size: 0.75rem;
    color: #8fadc7;
    margin-top: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    color: #8fadc7;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .main-area {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map {
    flex: 1;
    background: #0e2030;
  }

  /* Override Leaflet tiles for a fjord-like feel */
  .leaflet-tile-pane { filter: saturate(0.7) brightness(0.9); }

  /* Sidebar */
  .sidebar {
    width: 320px;
    background: var(--panel-bg);
    border-left: 1px solid #1e4060;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #1e4060;
    background: rgba(0,0,0,0.2);
  }

  .sidebar-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: #fff;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 3px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.06);
    color: #aac0d4;
    border-color: #1e4060;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--amber);
    color: var(--ocean);
    border-color: var(--amber);
  }

  .projects-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 0;
  }

  .projects-list::-webkit-scrollbar { width: 5px; }
  .projects-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .projects-list::-webkit-scrollbar-thumb { background: #2a5070; border-radius: 3px; }

  .project-item {
    padding: 11px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .project-item:hover {
    background: rgba(212, 135, 10, 0.12);
  }

  .project-item.selected {
    background: rgba(212, 135, 10, 0.2);
    border-left: 3px solid var(--amber);
  }

  .project-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .project-info h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e8f0f8;
    line-height: 1.3;
  }

  .project-info .meta {
    font-size: 0.72rem;
    color: #7a9ab5;
    margin-top: 2px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-tag {
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 2px;
  }

  /* Detail panel */
  .detail-panel {
    display: none;
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 300px;
    background: var(--panel-bg);
    border: 1px solid var(--amber);
    border-radius: 4px;
    padding: 18px;
    z-index: 900;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .detail-panel.visible { display: block; }

  .detail-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: #fff;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(212,135,10,0.4);

    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: flex-start;
  }

  .detail-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--amber);
    width: 80px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .detail-value {
    font-size: 0.82rem;
    color: #c5d8e8;
    line-height: 1.4;
  }

  .close-detail {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: #7a9ab5;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.2s;
  }
  .close-detail:hover { color: #fff; }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 20px;
    right: 340px;
    background: var(--panel-bg);
    border: 1px solid #1e4060;
    border-radius: 4px;
    padding: 12px 14px;
    z-index: 900;
    font-size: 0.72rem;
  }

  .legend h4 {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #7a9ab5;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    color: #aac0d4;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Custom marker styles */
  .custom-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.2s;
    cursor: pointer;
  }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper {
    background: var(--panel-bg);
    border: 1px solid var(--amber);
    border-radius: 4px;
    color: var(--light-text);
    font-family: 'Source Sans 3', sans-serif;
  }

  .leaflet-popup-close-button { color: #7a9ab5 !important; }

    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;

  .popup-meta {

    color: #aac0d4;

  .popup-role {
    display: inline-block;

    border-radius: 2px;
    font-size: 0.68rem;
    font-weight: 600;

    padding: 20px 18px;
    text-align: center;
    color: #5a7a95;
    font-size: 0.82rem;
  }

  .county-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #4a7090;
    margin-top: 14px;
    margin-bottom: 4px;
    padding: 0 18px;
    font-weight: 600;
  }

</style>

// ==================== MAP INIT ====================
const map = L.map('map', {
  center: [61.0, 6.5],
  zoom: 6,
  zoomControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 17
}).addTo(map);

L.control.zoom({ position: 'topleft' }).addTo(map);

// Color scheme
const COLOR = {
  lead: '#d4870a',
  partner: '#4a9e64',
  hq: '#3a7fc1'
};

function getColor(p) {
  if (p.type === 'hq') return COLOR.hq;
  return p.role === 'lead' ? COLOR.lead : COLOR.partner;
}

function getSize(p) {
  if (p.type === 'hq') return 16;
  if (p.type === 'dagsturhytte') return 10;
  return 13;
}

// Create SVG circle markers
function createMarker(p) {
  const color = getColor(p);
  const size = getSize(p);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size*2+4}" height="${size*2+4}">
    <circle cx="${size+2}" cy="${size+2}" r="${size}" fill="${color}" fill-opacity="0.9" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    ${p.type==='hq' ? `<circle cx="${size+2}" cy="${size+2}" r="${size*0.4}" fill="rgba(255,255,255,0.8)"/>` : ''}
  </svg>`;
  const icon = L.divIcon({
    html: svg,
    className: '',
    iconSize: [size*2+4, size*2+4],
    iconAnchor: [size+2, size+2]
  });
  const marker = L.marker([p.lat, p.lng], { icon });
  marker.on('click', () => showDetail(p));
  const roleLabel = p.role === 'lead' ? 'Hovudentreprenør' : 'Partner';
  marker.bindTooltip(`<div class="popup-title">${p.name}</div>
    <div class="popup-meta">${p.municipality} · ${p.county}<br>${p.year}<br>
    <span class="popup-role ${p.role==='lead'?'role-lead':'role-partner'}">${roleLabel}</span></div>`, {
    direction: 'top', offset: [0, -size-4],
    className: 'custom-tooltip'
  });
  return marker;
}

// Layer group
const markerGroup = L.layerGroup().addTo(map);
const markerMap = {};

projects.forEach(p => {
  const m = createMarker(p);
  markerMap[p.id] = m;
  markerGroup.addLayer(m);
});

// ==================== DETAIL PANEL ====================
function showDetail(p) {
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <button class="close-detail" onclick="document.getElementById('detail-panel').classList.remove('visible')">✕</button>
    <h3>${p.name}</h3>
    <div class="detail-row"><span class="detail-label">Fylke</span><span class="detail-value">${p.county}</span></div>
    <div class="detail-row"><span class="detail-label">Kommune</span><span class="detail-value">${p.municipality}</span></div>
    <div class="detail-row"><span class="detail-label">År</span><span class="detail-value">${p.year}</span></div>
    <div class="detail-row"><span class="detail-label">Rolle</span><span class="detail-value">${p.role==='lead'?'Hovudentreprenør':'Partner / Underleverandør'}</span></div>
    <div class="detail-row"><span class="detail-label">Kontrakt</span><span class="detail-value">${p.contract}</span></div>
    <div class="detail-row"><span class="detail-label">Om</span><span class="detail-value">${p.description}</span></div>
  `;
  panel.classList.add('visible');
  map.setView([p.lat, p.lng], Math.max(map.getZoom(), 9), {animate: true});

  // Highlight sidebar item
  document.querySelectorAll('.project-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('item-' + p.id);
  if (el) {
    el.classList.add('selected');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Create panel placeholder
const panelEl = document.createElement('div');
panelEl.id = 'detail-panel';
panelEl.className = 'detail-panel';
document.querySelector('.main-area').style.position = 'relative';
document.querySelector('.main-area').appendChild(panelEl);

// ==================== SIDEBAR ====================
let currentFilter = 'all';

function buildList(filter) {
  const list = document.getElementById('projects-list');
  list.innerHTML = '';

  const filtered = projects.filter(p => {
    if (filter === 'all') return true;
    if (filter === 'dagsturhytte') return p.category === 'dagsturhytte';
    if (filter === 'bygg') return p.category === 'bygg';
    if (filter === 'lead') return p.role === 'lead';
    if (filter === 'partner') return p.role === 'partner';
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">Ingen prosjekter funne.</div>';
    return;
  }

  // Group by county
  const byCounty = {};
  filtered.forEach(p => {
    if (!byCounty[p.county]) byCounty[p.county] = [];
    byCounty[p.county].push(p);
  });

  const countyOrder = ['Vestland', 'Rogaland', 'Møre og Romsdal'];
  countyOrder.forEach(county => {
    if (!byCounty[county]) return;
    const label = document.createElement('div');
    label.className = 'county-label';
    label.textContent = county;
    list.appendChild(label);

    byCounty[county].forEach(p => {
      const el = document.createElement('div');
      el.className = 'project-item';
      el.id = 'item-' + p.id;
      el.innerHTML = `
        <div class="project-dot" style="background:${getColor(p)}"></div>
        <div class="project-info">
          <h3>${p.name}</h3>
          <div class="meta">
            <span class="meta-tag">${p.municipality}</span>
            <span class="meta-tag">${p.year}</span>
            <span class="meta-tag">${p.role === 'lead' ? 'Hovud' : 'Partner'}</span>
          </div>
        </div>
      `;
      el.addEventListener('click', () => showDetail(p));
      list.appendChild(el);
    });
  });

  // Update marker visibility
  projects.forEach(p => {
    const m = markerMap[p.id];
    if (!m) return;
    const visible = filtered.find(f => f.id === p.id);
    if (visible) {
      if (!markerGroup.hasLayer(m)) markerGroup.addLayer(m);
    } else {
      markerGroup.removeLayer(m);
    }
  });

  document.getElementById('stat-total').textContent = filtered.length === projects.length ? '60+' : filtered.length;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildList(currentFilter);
  });
});

buildList('all');

// Adjust legend position
function adjustLegend() {
  const sidebar = document.querySelector('.sidebar');
  const legend = document.getElementById('legend');
  legend.style.right = (sidebar.offsetWidth + 20) + 'px';
}
adjustLegend();
window.addEventListener('resize', adjustLegend);
